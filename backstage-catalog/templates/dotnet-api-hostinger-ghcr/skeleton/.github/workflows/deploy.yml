name: deploy

on:
  push:
    branches:
      - develop
      - stage
      - main

concurrency:
  group: deploy-{% raw %}${{ github.ref_name }}{% endraw %}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ghcr.io/{{ cookiecutter.owner }}/{{ cookiecutter.appName }}
  APP_NAME: {{ cookiecutter.appName }}
  PROJECT_PATH: ./src/{{ cookiecutter.projectName }}/{{ cookiecutter.projectName }}.csproj

jobs:
  tests:
    name: Build and Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Restore API
        run: dotnet restore "{% raw %}${{ env.PROJECT_PATH }}{% endraw %}"

      - name: Build API
        run: dotnet build "{% raw %}${{ env.PROJECT_PATH }}{% endraw %}" --configuration Release --no-restore

      - name: Skip tests temporarily
        run: echo "No tests project configured yet"

  docker_and_deploy:
    name: Publish Image and Deploy
    runs-on: ubuntu-latest
    needs: tests

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve environment settings
        id: vars
        shell: bash
        run: |
          set -e

          case "${GITHUB_REF_NAME}" in
            develop)
              echo "environment_name=dev" >> "$GITHUB_OUTPUT"
              echo "image_tag=dev" >> "$GITHUB_OUTPUT"
              echo "compose_source=docker/docker-compose.dev.yml" >> "$GITHUB_OUTPUT"
              echo "app_dir=/opt/apps/dev/{{ cookiecutter.appName }}" >> "$GITHUB_OUTPUT"
              echo "container_name={{ cookiecutter.appName }}-dev" >> "$GITHUB_OUTPUT"
              ;;
            stage)
              echo "environment_name=stage" >> "$GITHUB_OUTPUT"
              echo "image_tag=stage" >> "$GITHUB_OUTPUT"
              echo "compose_source=docker/docker-compose.stage.yml" >> "$GITHUB_OUTPUT"
              echo "app_dir=/opt/apps/stage/{{ cookiecutter.appName }}" >> "$GITHUB_OUTPUT"
              echo "container_name={{ cookiecutter.appName }}-stage" >> "$GITHUB_OUTPUT"
              ;;
            main)
              echo "environment_name=prod" >> "$GITHUB_OUTPUT"
              echo "image_tag=prod" >> "$GITHUB_OUTPUT"
              echo "compose_source=docker/docker-compose.prod.yml" >> "$GITHUB_OUTPUT"
              echo "app_dir=/opt/apps/prod/{{ cookiecutter.appName }}" >> "$GITHUB_OUTPUT"
              echo "container_name={{ cookiecutter.appName }}-prod" >> "$GITHUB_OUTPUT"
              ;;
            *)
              echo "Unsupported branch: ${GITHUB_REF_NAME}"
              exit 1
              ;;
          esac

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: {% raw %}${{ env.REGISTRY }}{% endraw %}
          username: {% raw %}${{ secrets.GHCR_USERNAME }}{% endraw %}
          password: {% raw %}${{ secrets.GHCR_PAT }}{% endraw %}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: {% raw %}${{ env.IMAGE_NAME }}{% endraw %}
          tags: |
            type=raw,value={% raw %}${{ steps.vars.outputs.image_tag }}{% endraw %}
            type=sha,prefix=sha-

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: {% raw %}${{ steps.meta.outputs.tags }}{% endraw %}
          labels: {% raw %}${{ steps.meta.outputs.labels }}{% endraw %}

      - name: Ensure app folder exists
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: {% raw %}${{ secrets.VPS_HOST }}{% endraw %}
          username: {% raw %}${{ secrets.VPS_USER }}{% endraw %}
          key: {% raw %}${{ secrets.VPS_SSH_KEY }}{% endraw %}
          script: |
            mkdir -p "{% raw %}${{ steps.vars.outputs.app_dir }}{% endraw %}"

      - name: Copy compose file
        uses: appleboy/scp-action@v0.1.7
        with:
          host: {% raw %}${{ secrets.VPS_HOST }}{% endraw %}
          username: {% raw %}${{ secrets.VPS_USER }}{% endraw %}
          key: {% raw %}${{ secrets.VPS_SSH_KEY }}{% endraw %}
          source: "{% raw %}${{ steps.vars.outputs.compose_source }}{% endraw %}"
          target: "{% raw %}${{ steps.vars.outputs.app_dir }}{% endraw %}"
          strip_components: 1

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: {% raw %}${{ secrets.VPS_HOST }}{% endraw %}
          username: {% raw %}${{ secrets.VPS_USER }}{% endraw %}
          key: {% raw %}${{ secrets.VPS_SSH_KEY }}{% endraw %}
          script: |
            set -e

            APP_DIR="{% raw %}${{ steps.vars.outputs.app_dir }}{% endraw %}"
            CONTAINER_NAME="{% raw %}${{ steps.vars.outputs.container_name }}{% endraw %}"
            IMAGE_NAME="{% raw %}${{ env.IMAGE_NAME }}{% endraw %}"
            IMAGE_TAG="{% raw %}${{ steps.vars.outputs.image_tag }}{% endraw %}"

            cd "$APP_DIR"

            echo "=== Login GHCR ==="
            echo "{% raw %}${{ secrets.GHCR_PAT }}{% endraw %}" | docker login ghcr.io -u "{% raw %}${{ secrets.GHCR_USERNAME }}{% endraw %}" --password-stdin

            echo "=== Verify image access ==="
            docker pull "${IMAGE_NAME}:${IMAGE_TAG}" || {
              echo "Unable to pull image ${IMAGE_NAME}:${IMAGE_TAG}"
              exit 1
            }

            echo "=== Files before rename ==="
            ls -la
            find . -maxdepth 2 -type f

            if [ -f "docker-compose.${IMAGE_TAG}.yml" ]; then
              mv -f "docker-compose.${IMAGE_TAG}.yml" docker-compose.yml
            fi

            if [ ! -f "docker-compose.yml" ]; then
              echo "docker-compose.yml not found in $APP_DIR"
              exit 1
            fi

            echo "=== Stop old container ==="
            docker rm -f "$CONTAINER_NAME" 2>/dev/null || true

            echo "=== Docker compose pull ==="
            docker compose -f docker-compose.yml -p "$CONTAINER_NAME" pull

            echo "=== Docker compose up ==="
            docker compose -f docker-compose.yml -p "$CONTAINER_NAME" up -d --remove-orphans

            echo "=== Running containers ==="
            docker ps --filter "name=$CONTAINER_NAME"

            echo "=== Deploy completed ==="
